services:
  - type: web
    name: ai-tools-hub-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false        # You will add this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render will auto-generate a secure secret
      - key: FRONTEND_URL
        sync: false        # Add your Vercel URL after deployment
