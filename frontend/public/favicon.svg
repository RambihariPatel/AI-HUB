<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0c1b"/>
      <stop offset="100%" stop-color="#05030a"/>
    </linearGradient>
    <!-- Neon Violet/Magenta Gradient -->
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <!-- Neon Cyan/Blue Gradient -->
    <linearGradient id="cyanGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Drop Shadow for Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Rounded Container with dark sleek gradient and neon-glow border -->
  <rect x="16" y="16" width="480" height="480" rx="110" fill="url(#bgGrad)" stroke="url(#neonGlow)" stroke-width="6"/>
  <rect x="24" y="24" width="464" height="464" rx="102" fill="none" stroke="url(#cyanGlow)" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Futuristic "A" & Neural Node Design -->
  <g filter="url(#glow)">
    <!-- Left Leg of "A" -->
    <path d="M180 370 L240 180 L272 180 L212 370 Z" fill="url(#cyanGlow)"/>
    <!-- Right Leg of "A" (glowing purple) -->
    <path d="M332 370 L272 180 L240 180 L300 370 Z" fill="url(#neonGlow)"/>
    <!-- Sleek Crossbar as a cybernetic connection -->
    <path d="M208 300 H304" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
    <!-- Glowing AI Core / Neural Node in center -->
    <circle cx="256" cy="148" r="28" fill="#ffffff" filter="url(#glow)"/>
    <circle cx="256" cy="148" r="16" fill="url(#cyanGlow)"/>
    
    <!-- Outer orbiting neural links -->
    <circle cx="204" cy="300" r="10" fill="#ffffff"/>
    <circle cx="308" cy="300" r="10" fill="#ffffff"/>
  </g>
</svg>